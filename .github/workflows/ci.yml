name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

jobs:
  client:
    name: Build & Test Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test --if-present

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  server:
    name: Build & Test Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify required secrets
        run: |
          MISSING=""
          [ -z "${AWS_ACCESS_KEY_ID}" ]     && MISSING="$MISSING AWS_ACCESS_KEY_ID"
          [ -z "${AWS_SECRET_ACCESS_KEY}" ] && MISSING="$MISSING AWS_SECRET_ACCESS_KEY"
          [ -z "${AWS_REGION}" ]            && MISSING="$MISSING AWS_REGION"
          [ -z "${SUPABASE_URL}" ]          && MISSING="$MISSING SUPABASE_URL"
          [ -z "${SUPABASE_ANON_KEY}" ]     && MISSING="$MISSING SUPABASE_ANON_KEY"
          if [ -n "$MISSING" ]; then
            echo "Missing required secrets:$MISSING"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "WARNING: Allowing build to continue since this is a pull request."
            else
              exit 1
            fi
          else
            echo "All required secrets are set"
          fi

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm run test --if-present

      - name: Build
        run: npm run build

      - name: Package server artifact
        if: github.ref == 'refs/heads/main'
        run: tar -czf server-dist.tgz -C dist .

      - name: Upload server artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/server-dist.tgz
          retention-days: 7
